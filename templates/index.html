<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Insurance Fraud Detection</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 min-h-screen flex items-center justify-center font-sans">

<div class="bg-white shadow-xl rounded-2xl p-10 w-full max-w-5xl">

<h1 class="text-3xl font-bold text-gray-800 text-center mb-2">Insurance Fraud Detection</h1>
<p class="text-gray-500 text-center mb-8">Enter key claim details. Advanced parameters are available if needed.</p>

<form action="/predict" method="POST" class="space-y-8">

<!-- PRIMARY USER INPUTS (MOST IMPORTANT FEATURES) -->

<div>
<h2 class="text-xl font-semibold text-gray-700 mb-4">Basic Claim Details</h2>

<div class="grid grid-cols-1 md:grid-cols-3 gap-6">

<input type="number" name="age" placeholder="Age" class="input" required>

<input type="number" name="months_as_customer" placeholder="Months as Customer" class="input" required>

<input type="number" name="policy_annual_premium" placeholder="Policy Annual Premium" class="input" required>

<input type="number" name="total_claim_amount" placeholder="Total Claim Amount" class="input" required>

<input type="number" name="number_of_vehicles_involved" placeholder="Number of Vehicles Involved" class="input" required>

<input type="number" name="bodily_injuries" placeholder="Bodily Injuries" class="input" required>

<input type="number" name="witnesses" placeholder="Witnesses" class="input" required>

<input type="number" name="auto_year" placeholder="Vehicle Year" class="input" required>

<input type="text" name="incident_severity" placeholder="Incident Severity (Minor/Major/Total Loss)" class="input" required>

</div>
</div>


<!-- ADVANCED SETTINGS -->

<div>

<button type="button" onclick="toggleAdvanced()" class="text-indigo-600 font-semibold hover:underline">
⚙ Advanced Settings
</button>

<div id="advanced" class="hidden mt-6">

<h2 class="text-xl font-semibold text-gray-700 mb-4">Advanced Policy & Incident Details</h2>

<div class="grid grid-cols-1 md:grid-cols-3 gap-6">

<div>
<label class="text-sm text-gray-600">Policy State</label>
<input type="text" name="policy_state" value="OH" class="input">
</div>

<div>
<label class="text-sm text-gray-600">Policy Deductable</label>
<input type="number" name="policy_deductable" value="500" class="input">
</div>

<div>
<label class="text-sm text-gray-600">Umbrella Limit</label>
<input type="number" name="umbrella_limit" value="0" class="input">
</div>

<div>
<label class="text-sm text-gray-600">Insured Sex</label>
<input type="text" name="insured_sex" value="MALE" class="input">
</div>

<div>
<label class="text-sm text-gray-600">Education Level</label>
<input type="text" name="insured_education_level" value="Bachelors" class="input">
</div>

<div>
<label class="text-sm text-gray-600">Occupation</label>
<input type="text" name="insured_occupation" value="other" class="input">
</div>

<div>
<label class="text-sm text-gray-600">Hobbies</label>
<input type="text" name="insured_hobbies" value="reading" class="input">
</div>

<div>
<label class="text-sm text-gray-600">Relationship</label>
<input type="text" name="insured_relationship" value="own-child" class="input">
</div>

<div>
<label class="text-sm text-gray-600">Capital Gains</label>
<input type="number" name="capital-gains" value="0" class="input">
</div>

<div>
<label class="text-sm text-gray-600">Capital Loss</label>
<input type="number" name="capital-loss" value="0" class="input">
</div>

<div>
<label class="text-sm text-gray-600">Incident Type</label>
<input type="text" name="incident_type" value="Single Vehicle Collision" class="input">
</div>

<div>
<label class="text-sm text-gray-600">Collision Type</label>
<input type="text" name="collision_type" value="Front Collision" class="input">
</div>

<div>
<label class="text-sm text-gray-600">Authorities Contacted</label>
<input type="text" name="authorities_contacted" value="Police" class="input">
</div>

<div>
<label class="text-sm text-gray-600">Incident State</label>
<input type="text" name="incident_state" value="NY" class="input">
</div>

<div>
<label class="text-sm text-gray-600">Incident City</label>
<input type="text" name="incident_city" value="New York" class="input">
</div>

<div>
<label class="text-sm text-gray-600">Property Damage</label>
<input type="text" name="property_damage" value="NO" class="input">
</div>

<div>
<label class="text-sm text-gray-600">Police Report Available</label>
<input type="text" name="police_report_available" value="YES" class="input">
</div>

<div>
<label class="text-sm text-gray-600">Injury Claim</label>
<input type="number" name="injury_claim" value="0" class="input">
</div>

<div>
<label class="text-sm text-gray-600">Property Claim</label>
<input type="number" name="property_claim" value="0" class="input">
</div>

<div>
<label class="text-sm text-gray-600">Vehicle Claim</label>
<input type="number" name="vehicle_claim" value="0" class="input">
</div>

<div>
<label class="text-sm text-gray-600">Auto Make</label>
<input type="text" name="auto_make" value="Toyota" class="input">
</div>

<div>
<label class="text-sm text-gray-600">Auto Model</label>
<input type="text" name="auto_model" value="Corolla" class="input">
</div>

<div>
<label class="text-sm text-gray-600">Claim to Premium Ratio</label>
<input type="number" step="any" name="claim_to_premium_ratio" value="1" class="input">
</div>

<div>
<label class="text-sm text-gray-600">Policy CSL Limit</label>
<input type="text" name="policy_csl_limit" value="300000" class="input">
</div>

</div>
</div>

</div>


<!-- SUBMIT BUTTON -->

<div class="text-center">
<button type="submit" class="bg-indigo-600 text-white px-10 py-3 rounded-lg hover:bg-indigo-700 transition">
Predict Fraud
</button>
</div>

</form>


<!-- PREDICTION RESULT -->

{% if prediction is not none %}

<div class="mt-8 text-center">

{% if prediction == 1 %}
<p class="text-red-600 text-xl font-semibold">⚠ Fraudulent Claim Detected</p>
{% endif %}

</div>

{% endif %}

</div>


<style>
.input{
width:100%;
border:1px solid #e5e7eb;
border-radius:10px;
padding:10px;
outline:none;
}

.input:focus{
border-color:#6366f1;
box-shadow:0 0 0 2px rgba(99,102,241,0.2);
}
</style>


<script>
function toggleAdvanced(){

const section = document.getElementById("advanced");

if(section.classList.contains("hidden")){
section.classList.remove("hidden");
}else{
section.classList.add("hidden");
}

}
</script>

</body>
</html>

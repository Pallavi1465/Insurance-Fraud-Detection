<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fraud Prediction Result</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 min-h-screen flex items-center justify-center">

<div class="bg-white shadow-xl rounded-2xl p-10 w-full max-w-xl text-center">

<h1 class="text-3xl font-bold text-gray-800 mb-6">
Fraud Risk Analysis
</h1>

<!-- Probability -->

<p class="text-lg text-gray-600 mb-2">
Fraud Probability
</p>

<div class="w-full bg-gray-200 rounded-full h-6 mb-6">
<div class="bg-red-500 h-6 rounded-full text-white text-sm flex items-center justify-center"
style="width: {{ probability }}%">
{{ probability }}%
</div>
</div>

<!-- Verdict -->

{% if prediction == 1 %}

<div class="bg-red-100 border border-red-400 text-red-700 px-6 py-4 rounded-lg">
⚠ High Risk: Fraudulent Claim Detected
</div>

{% else %}

<div class="bg-green-100 border border-green-400 text-green-700 px-6 py-4 rounded-lg">
✔ Legitimate Claim
</div>

{% endif %}

<br>

<a href="/" class="bg-indigo-600 text-white px-6 py-3 rounded-lg hover:bg-indigo-700 transition">
Check Another Claim
</a>

</div>

</body>
</html>
